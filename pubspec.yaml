name: copiaos_mobile
description: CopiaOS — Mobile Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # Navigation
  go_router: ^14.0.0

  # Networking
  dio: ^5.4.0

  # Storage
  flutter_secure_storage: ^9.0.0

  # Barcode Scanning
  mobile_scanner: ^3.5.0

  # Location
  geolocator: ^11.0.0

  # Notifications
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^17.0.0

  # Biometrics
  local_auth: ^2.2.0

  # Local Database
  drift: ^2.16.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.0
  path: ^1.8.0

  # UI
  intl: ^0.19.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  fl_chart: ^0.68.0
  cupertino_icons: ^1.0.6
  url_launcher: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.4.0
  drift_dev: ^2.16.0

flutter:
  uses-material-design: true
